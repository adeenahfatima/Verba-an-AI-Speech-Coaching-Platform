services:
  - type: web
    name: verba-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.api:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: verba-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: verba-db
    databaseName: verba
    user: verba_user
